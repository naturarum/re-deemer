# Fallback CI build of the macOS release archive (UNSIGNED — the real flow
# is local: package.sh + notarize.sh, see README-RELEASING.md).
#
# The archive is attached as a DRAFT release under the *stable* name
# RE-DEEMER-macos.zip, so the website's
# .../releases/latest/download/RE-DEEMER-macos.zip link always serves the
# newest version with zero site edits once published.

name: release
# Manual trigger only. (The v1.0.0 tag-push run failed at the upload step
# for lack of the permission below — fortunately, since it would have
# replaced the notarized assets with unsigned ones.)
on:
  workflow_dispatch:

# Required for action-gh-release to create/update a draft release.
permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add x86_64-apple-darwin

      - name: Package
        run: ./scripts/package.sh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/RE-DEEMER-macos.zip
            dist/RE-DEEMER-*-macos.zip
          body_path: CHANGELOG.md
          draft: true # review the draft, then click publish
